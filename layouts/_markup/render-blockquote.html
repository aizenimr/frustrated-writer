{{ $emojis := dict
  "caution" ":exclamation:"
  "important" ":point_left:"
  "note" ":information_source:"
  "tip" ":bulb:"
  "warning" ":warning:"
}}

{{ if eq .Type "alert" }}
  <blockquote class="alert alert-{{ .AlertType }}">
    <div class="alert-heading">
      {{ transform.Emojify (index $emojis .AlertType) }}
    </div>
    <div>
      {{ .Text }}
    </div>
  </blockquote>
{{ else }}
  <blockquote class="quote">
    {{ .Text }}
  </blockquote>
{{ end }}
